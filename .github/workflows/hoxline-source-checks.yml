name: Hoxline Source Checks

on:
  pull_request:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  source-checks:
    name: PR/source checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Compile controller
        run: python -B -m py_compile scripts/ho_factory.py

      - name: Runtime collector self-tests
        run: |
          python -B scripts/ho_factory.py collector-linux-self-test --format json >/dev/null
          python -B scripts/ho_factory.py collector-normalizer-self-test --format json >/dev/null
          python -B scripts/ho_factory.py hoxline-runtime-canary --controlled-count 3 --format json >/dev/null
          python -B scripts/ho_factory.py hoxline-runtime-schedule-gate --event-name schedule --format json >/dev/null
          python -B scripts/ho_factory.py hoxline-runtime-ops-self-test --repo-root "$GITHUB_WORKSPACE" --format json >/dev/null
          python -B scripts/ho_factory.py hoxline-control-plane-self-test --repo-root "$GITHUB_WORKSPACE" --format json >/dev/null
          python -B scripts/ho_factory.py hoxline-schedule-readiness-self-test --repo-root "$GITHUB_WORKSPACE" --format json >/dev/null
          python -B scripts/ho_factory.py hoxline-schedule-pilot-self-test --repo-root "$GITHUB_WORKSPACE" --format json >/dev/null
          python -B scripts/ho_factory.py hoxline-multi-detection-runtime-self-test --repo-root "$GITHUB_WORKSPACE" --format json >/dev/null
          python -B scripts/ho_factory.py hoxline-sanitized-live-receipt-intake-self-test --repo-root "$GITHUB_WORKSPACE" --format json >/dev/null
          python -B scripts/ho_factory.py hoxline-operator-receipt-collection-self-test --repo-root "$GITHUB_WORKSPACE" --format json >/dev/null

      - name: Schema parse checks
        run: |
          python -m json.tool contracts/schemas/runtime-case-collector-v0-linux.schema.json >/dev/null
          python -m json.tool contracts/schemas/runtime-case-collector-v0-normalizer.schema.json >/dev/null
          python -m json.tool contracts/schemas/runtime-route-proof-v1-private-candidate.schema.json >/dev/null
          python -m json.tool contracts/schemas/hoxline-evidence-graph-v0.schema.json >/dev/null
          python -m json.tool contracts/schemas/hoxline-promotion-state-v0.schema.json >/dev/null
          python -m json.tool contracts/schemas/hoxline-claim-decision-v0.schema.json >/dev/null
          python -m json.tool contracts/schemas/hoxline-proofcard-draft-v0.schema.json >/dev/null
          python -m json.tool contracts/schemas/hoxline-backpressure-policy-v0.schema.json >/dev/null
          python -m json.tool contracts/schemas/hoxline-schedule-readiness-v0.schema.json >/dev/null
          python -m json.tool contracts/schemas/hoxline-controlled-schedule-pilot-v0.schema.json >/dev/null
          python -m json.tool contracts/schemas/hoxline-sanitized-live-receipt-v0.schema.json >/dev/null
          python -m json.tool contracts/schemas/hoxline-operator-receipt-packet-v0.schema.json >/dev/null
          python -m json.tool contracts/examples/hoxline-operator-receipt-packet-v0.ho-det-011.sample.json >/dev/null
          python -m json.tool contracts/examples/hoxline-operator-receipt-packet-v0.ho-det-012.sample.json >/dev/null

      - name: Claim-boundary checks
        run: |
          python -B scripts/ho_factory.py public-status-source-contract-verify --format json

      - name: Workflow safety checks
        run: |
          python -B scripts/ho_factory.py hoxline-workflow-safety-verify --repo-root "$GITHUB_WORKSPACE" --format json >/dev/null

      - name: Python unit tests
        run: |
          python -B -m unittest tests/test_hoxline_runtime_ops.py
          python -B -m unittest tests/test_hoxline_control_plane.py
          python -B -m unittest tests/test_hoxline_schedule_readiness.py
          python -B -m unittest tests/test_hoxline_controlled_schedule_pilot.py
          python -B -m unittest tests/test_hoxline_multi_detection_runtime.py
          python -B -m unittest tests/test_hoxline_sanitized_live_receipt_intake.py
          python -B -m unittest tests/test_hoxline_operator_receipt_collection.py
          python -B -m unittest tests/test_verify_public_status_source_contract.py

      - name: Git whitespace check
        run: git diff --check
