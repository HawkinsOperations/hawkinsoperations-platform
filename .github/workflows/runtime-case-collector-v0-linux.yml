name: Runtime Case Collector v0 Linux

on:
  workflow_dispatch:
    inputs:
      collect_candidates:
        description: Write private Linux candidates only after route preflight passes
        required: true
        type: boolean
        default: false
      collector_output_route:
        description: Private Linux collector output route on the trusted runner host
        required: true
        type: string
        default: /var/lib/hawkinsoperations/runtime-case-collector-v0/linux/
  schedule:
    - cron: "15 * * * *"

permissions:
  contents: read

jobs:
  collect-linux-candidates:
    name: Collect Linux runtime candidates
    runs-on: [self-hosted, ho-gpu-01, gpu, v100]
    steps:
      - name: Check out platform repo
        uses: actions/checkout@v4

      - name: Preflight Linux collector lane
        run: |
          python3 -B scripts/ho_factory.py collector-linux-preflight --format json

      - name: Self-test Linux collector lane
        run: |
          python3 -B scripts/ho_factory.py collector-linux-self-test --format json

      - name: Dry-run Linux collector lane
        run: |
          python3 -B scripts/ho_factory.py collector-linux-run-once --dry-run --format json

      - name: Verify Linux private output route
        if: ${{ github.event_name == 'schedule' || inputs.collect_candidates }}
        env:
          COLLECTOR_OUTPUT_ROUTE: ${{ github.event_name == 'schedule' && vars.RCC_LINUX_OUTPUT_ROUTE || inputs.collector_output_route }}
        run: |
          if [ -z "$COLLECTOR_OUTPUT_ROUTE" ]; then
            echo "RCC_LINUX_OUTPUT_ROUTE is required for scheduled collection, and collector_output_route is required for workflow_dispatch." >&2
            exit 1
          fi
          preflight="$(python3 -B scripts/ho_factory.py collector-linux-preflight --output-route "$COLLECTOR_OUTPUT_ROUTE" --format json)"
          printf '%s\n' "$preflight" | python3 -c 'import json, os, sys; data=json.load(sys.stdin); route=data["route_status"]; summary=os.environ["GITHUB_STEP_SUMMARY"]; lines=["## Runtime Case Collector v0 Linux", "- collector lane: linux", f"- workflow run ID: {os.environ.get(\"GITHUB_RUN_ID\", \"unknown\")}", f"- route approved: {route.get(\"approved_linux_private_route\") is not None}", f"- route exists: {route.get(\"route_exists\")}", f"- route writable: {route.get(\"route_writable\")}", "- append_to_lifetime_ledger: false", "- governed_cases_appended: false", "- public_safe_status: NOT_PUBLIC_SAFE"]; open(summary, "a", encoding="utf-8").write("\\n".join(lines) + "\\n")'

      - name: Collect Linux private candidates
        if: ${{ github.event_name == 'schedule' || inputs.collect_candidates }}
        env:
          COLLECTOR_OUTPUT_ROUTE: ${{ github.event_name == 'schedule' && vars.RCC_LINUX_OUTPUT_ROUTE || inputs.collector_output_route }}
        run: |
          if [ -z "$COLLECTOR_OUTPUT_ROUTE" ]; then
            echo "RCC_LINUX_OUTPUT_ROUTE is required for scheduled collection, and collector_output_route is required for workflow_dispatch." >&2
            exit 1
          fi
          collect="$(python3 -B scripts/ho_factory.py collector-linux-run-once --output-route "$COLLECTOR_OUTPUT_ROUTE" --format json)"
          printf '%s\n' "$collect" | python3 -c 'import json, os, sys; data=json.load(sys.stdin); summary=os.environ["GITHUB_STEP_SUMMARY"]; lines=[f"- candidate_count: {data.get(\"candidate_count\")}", f"- duplicate_count: {data.get(\"duplicate_count\")}", f"- generated_output_files: {data.get(\"generated_output_files\")}", "- final boundary: RUNTIME_CASE_COLLECTOR_V0_LINUX_PRIVATE_CANDIDATE_COLLECTION_ONLY"]; open(summary, "a", encoding="utf-8").write("\\n".join(lines) + "\\n")'

      - name: Verify Linux collector sample
        run: |
          python3 -B scripts/ho_factory.py collector-linux-verify --format json

      - name: Check Linux collector dedupe
        run: |
          python3 -B scripts/ho_factory.py collector-linux-dedupe-check --format json
