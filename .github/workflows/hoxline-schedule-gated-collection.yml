name: Hoxline Schedule-Gated Collection

on:
  schedule:
    - cron: '17,47 * * * *'
  workflow_dispatch:
    inputs:
      enable_continuous_gate:
        description: Must be true and repo variable HOXLINE_CONTINUOUS_GATE_ENABLED must also be true.
        required: true
        type: boolean
        default: false
      private_route:
        description: Private runtime route on trusted runner
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: hoxline-schedule-gated-collection
  cancel-in-progress: false

jobs:
  schedule-gate:
    name: Schedule gated private collection
    if: github.repository == 'HawkinsOperations/hawkinsoperations-platform' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, ho-gpu-01, gpu, v100]
    timeout-minutes: 15
    env:
      HOXLINE_PRIVATE_ROUTE: /var/lib/hoxline/private-scheduled-collector-v0
      HOXLINE_COLLECTOR_STATE: /var/lib/hoxline/private-scheduled-collector-v0/collector-state.sqlite
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Emergency disable check
        if: vars.HOXLINE_EMERGENCY_DISABLE == 'true'
        run: |
          python3 -B scripts/ho_factory.py hoxline-scheduled-private-collection \
            --repo-root "$GITHUB_WORKSPACE" \
            --private-route "$HOXLINE_PRIVATE_ROUTE" \
            --state-path "$HOXLINE_COLLECTOR_STATE" \
            --event-name "$GITHUB_EVENT_NAME" \
            --emergency-disable \
            --format json >/dev/null
          exit 0

      - name: Hard disabled unless schedule gate is true
        if: github.event_name == 'schedule' && vars.HOXLINE_CONTINUOUS_GATE_ENABLED != 'true'
        run: |
          python3 -B scripts/ho_factory.py hoxline-scheduled-private-collection \
            --repo-root "$GITHUB_WORKSPACE" \
            --private-route "$HOXLINE_PRIVATE_ROUTE" \
            --state-path "$HOXLINE_COLLECTOR_STATE" \
            --event-name "$GITHUB_EVENT_NAME" \
            --format json >/dev/null
          exit 0

      - name: Hard disabled unless manual gates are true
        if: github.event_name == 'workflow_dispatch' && (vars.HOXLINE_CONTINUOUS_GATE_ENABLED != 'true' || inputs.enable_continuous_gate != true)
        run: |
          python3 -B scripts/ho_factory.py hoxline-scheduled-private-collection \
            --repo-root "$GITHUB_WORKSPACE" \
            --private-route "$HOXLINE_PRIVATE_ROUTE" \
            --state-path "$HOXLINE_COLLECTOR_STATE" \
            --event-name "$GITHUB_EVENT_NAME" \
            --format json >/dev/null
          exit 0

      - name: Guard trusted runtime context
        run: |
          python3 -B scripts/ho_factory.py hoxline-runtime-job-guard \
            --event-name workflow_dispatch \
            --runner-label self-hosted \
            --runner-label ho-gpu-01 \
            --trusted-runtime \
            --uses-private-route \
            --format json >/dev/null

      - name: Run standing private collector
        run: |
          python3 -B scripts/ho_factory.py hoxline-scheduled-private-collection \
            --repo-root "$GITHUB_WORKSPACE" \
            --private-route "$HOXLINE_PRIVATE_ROUTE" \
            --state-path "$HOXLINE_COLLECTOR_STATE" \
            --detection-id HO-DET-009 \
            --detection-id HO-DET-011 \
            --detection-id HO-DET-012 \
            --event-name "$GITHUB_EVENT_NAME" \
            --enable-input \
            --repo-var-enabled \
            --trusted-runner \
            --max-runtime-seconds 720 \
            --max-candidates 3 \
            --max-new-signals 3 \
            --max-duplicate-suppressions 20 \
            --max-retries 2 \
            --max-dead-letters 3 \
            --format json >/dev/null
