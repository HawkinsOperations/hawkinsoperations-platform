name: Local GPU Triage Gate

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: local-gpu-triage-gate
  cancel-in-progress: false

jobs:
  local-gpu-triage-status:
    name: Local GPU triage status
    if: github.repository == 'HawkinsOperations/hawkinsoperations-platform' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, ho-gpu-01, gpu, v100]
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Confirm runner context
        run: |
          echo "RUNNER_LABEL_SET=approved_self_hosted_gpu_label_set"
          echo "RUNNER_SCOPE=repo_level_self_hosted"
          if command -v nvidia-smi >/dev/null 2>&1; then
            nvidia-smi --query-gpu=name --format=csv,noheader >/dev/null
            echo "GPU_CAPABILITY_CHECK=pass"
          else
            echo "GPU_CAPABILITY_CHECK=fail"
            exit 1
          fi

      - name: Validate local GPU triage contract JSON
        run: |
          python3 -m json.tool contracts/schemas/local-gpu-triage-support-v0.schema.json >/dev/null
          python3 -m json.tool contracts/examples/local-gpu-triage-support-v0.sample.json >/dev/null
          echo "LOCAL_GPU_TRIAGE_JSON_VALIDATION=pass"

      - name: Run deterministic local GPU triage verifier
        run: |
          python3 -B scripts/verify_local_gpu_triage.py contracts/examples/local-gpu-triage-support-v0.sample.json --self-test

      - name: Print local GPU triage status packet
        run: |
          python3 -B scripts/run_local_gpu_triage.py status --format receipt

      - name: Run factory controller plan when org mirror is present
        run: |
          ORG_ROOT="$(dirname "$GITHUB_WORKSPACE")"
          required_repos="hawkinsoperations-detections hawkinsoperations-validation hawkinsoperations-proof hawkinsoperations-platform"
          missing=""
          for repo in $required_repos; do
            if [ ! -d "$ORG_ROOT/$repo" ]; then
              missing="$missing $repo"
            fi
          done
          if [ -n "$missing" ]; then
            echo "FACTORY_CONTROLLER_PLAN=skipped_isolated_checkout"
            exit 0
          fi
          python3 -B scripts/ho_factory.py plan --detection all --repo-root "$ORG_ROOT" --format json >/dev/null
          echo "FACTORY_CONTROLLER_PLAN=pass"

      - name: Run existing platform verifier gates
        run: |
          python3 -B scripts/verify-ho-det-001-runtime-contract.py
          python3 -B scripts/verify-ho-det-011-case-packet.py
