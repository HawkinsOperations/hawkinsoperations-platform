name: Governance Gate

on:
  pull_request:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  required-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Required Governance Files
        shell: pwsh
        run: |
          $required = @(
            "README.md",
            "SCOPE.md",
            "GOVERNANCE.md",
            "STATUS.md",
            "contracts/lifetime-case-ledger-v1-state-manifest.json",
            "contracts/lifetime-case-ledger-v1-recoverability-drill.json",
            "docs/factory/LIFETIME_CASE_LEDGER_RECOVERABILITY_DRILL.md",
            "scripts/verify-lifetime-ledger-backup-drill.py",
            "evidence/EVIDENCE_LEDGER_SCHEMA.json",
            "evidence/evidence-ledger.json"
          )
          $missing = @()
          foreach ($f in $required) {
            if (-not (Test-Path -LiteralPath $f)) { $missing += $f }
          }
          if ($missing.Count -gt 0) {
            Write-Error ("Missing required files: " + ($missing -join ", "))
            exit 1
          }
      - name: Verify Lifetime Case Ledger recoverability drill required context
        run: |
          python -B scripts/verify-lifetime-ledger-backup-drill.py --repo-root "$GITHUB_WORKSPACE" --format json >/dev/null

  ho-det-011-case-packet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install schema validation dependency
        run: python -m pip install jsonschema
      - name: Verify HO-DET-011 case packet guardrail
        run: python scripts/verify-ho-det-011-case-packet.py

  runtime-route-proof-v1-private-candidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse Runtime Route Proof v1 private candidate schema
        run: python -m json.tool contracts/schemas/runtime-route-proof-v1-private-candidate.schema.json >/dev/null
      - name: Parse Runtime Route Proof v1 private candidate sample
        run: python -m json.tool contracts/examples/runtime-route-proof-v1-private-candidate.sample.json >/dev/null
      - name: Verify Runtime Route Proof v1 private candidate packet
        run: python scripts/verify-runtime-route-proof-v1-private-candidate.py >/dev/null

  runtime-collector-eligibility-v0:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install schema validation dependency
        run: python -m pip install jsonschema
      - name: Verify Runtime Collector Eligibility Registry v0
        run: |
          python scripts/verify-runtime-collector-eligibility-v0.py --registry contracts/examples/runtime-collector-eligibility-v0.sample.json --schema contracts/schemas/runtime-collector-eligibility-v0.schema.json

  lifetime-case-ledger-v1:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check out HawkinsOperations sibling repositories
        uses: actions/checkout@v4
        with:
          repository: HawkinsOperations/hawkinsoperations-detections
          path: hawkinsoperations-detections
      - uses: actions/checkout@v4
        with:
          repository: HawkinsOperations/hawkinsoperations-validation
          path: hawkinsoperations-validation
      - uses: actions/checkout@v4
        with:
          repository: HawkinsOperations/hawkinsoperations-proof
          path: hawkinsoperations-proof
      - name: Verify Lifetime Case Ledger v1 spine
        run: |
          python -B scripts/ho_factory.py lifetime-ledger-verify --repo-root "$GITHUB_WORKSPACE" --format json >/dev/null
      - name: Verify Lifetime Case Ledger v1 state manifest
        run: |
          python -B scripts/ho_factory.py lifetime-ledger-state-manifest-verify --repo-root "$GITHUB_WORKSPACE" --format json >/dev/null
      - name: Verify Lifetime Case Ledger v1 recoverability drill
        run: |
          python -B scripts/verify-lifetime-ledger-backup-drill.py --repo-root "$GITHUB_WORKSPACE" --format json >/dev/null
      - name: Verify Lifetime Case Ledger v1 append gate
        run: |
          python -B scripts/ho_factory.py lifetime-ledger-append-gate-self-test --repo-root "$GITHUB_WORKSPACE" --format json >/dev/null
      - name: Verify Lifetime Case Ledger v1 correction gate
        run: |
          python -B scripts/ho_factory.py lifetime-ledger-correction-self-test --repo-root "$GITHUB_WORKSPACE" --format json >/dev/null
      - name: Verify Lifetime Case Ledger v1 multi-detection manual-fire gate
        run: |
          python -B scripts/ho_factory.py lifetime-ledger-multi-detection-self-test --repo-root "$GITHUB_WORKSPACE" --format json >/dev/null
