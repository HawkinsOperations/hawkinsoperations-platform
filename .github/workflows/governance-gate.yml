name: Governance Gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  required-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Required Governance Files
        shell: pwsh
        run: |
          $required = @(
            "README.md",
            "SCOPE.md",
            "GOVERNANCE.md",
            "STATUS.md",
            "evidence/EVIDENCE_LEDGER_SCHEMA.json",
            "evidence/evidence-ledger.json"
          )
          $missing = @()
          foreach ($f in $required) {
            if (-not (Test-Path -LiteralPath $f)) { $missing += $f }
          }
          if ($missing.Count -gt 0) {
            Write-Error ("Missing required files: " + ($missing -join ", "))
            exit 1
          }

  ho-det-011-case-packet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install schema validation dependency
        run: python -m pip install jsonschema
      - name: Verify HO-DET-011 case packet guardrail
        run: python scripts/verify-ho-det-011-case-packet.py

  lifetime-case-ledger-v1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check out HawkinsOperations sibling repositories
        uses: actions/checkout@v4
        with:
          repository: HawkinsOperations/hawkinsoperations-detections
          path: hawkinsoperations-detections
      - uses: actions/checkout@v4
        with:
          repository: HawkinsOperations/hawkinsoperations-validation
          path: hawkinsoperations-validation
      - uses: actions/checkout@v4
        with:
          repository: HawkinsOperations/hawkinsoperations-proof
          path: hawkinsoperations-proof
      - name: Verify Lifetime Case Ledger v1 spine
        run: |
          python -B scripts/ho_factory.py lifetime-ledger-verify --repo-root "$GITHUB_WORKSPACE" --format json >/dev/null
      - name: Verify Lifetime Case Ledger v1 append gate
        run: |
          python -B scripts/ho_factory.py lifetime-ledger-append-gate-self-test --repo-root "$GITHUB_WORKSPACE" --format json >/dev/null
      - name: Verify Lifetime Case Ledger v1 correction gate
        run: |
          python -B scripts/ho_factory.py lifetime-ledger-correction-self-test --repo-root "$GITHUB_WORKSPACE" --format json >/dev/null
      - name: Verify Lifetime Case Ledger v1 multi-detection manual-fire gate
        run: |
          python -B scripts/ho_factory.py lifetime-ledger-multi-detection-self-test --repo-root "$GITHUB_WORKSPACE" --format json >/dev/null
